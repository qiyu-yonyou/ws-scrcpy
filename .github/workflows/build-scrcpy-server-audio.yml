# 在 GitHub 上手动运行后，可从本页 Artifacts 下载「带音频的 scrcpy-server」。
# 下载的 apk 改名为 scrcpy-server.jar 放到 vendor/Genymobile/scrcpy/ 即可。
name: 构建带音频的 scrcpy-server

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 检出仓库（含子模块 _scrcpy_fork）
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 设置 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >
            tools
            platform-tools
            platforms;android-33
            build-tools;33.0.2

      - name: 配置 Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: "7.5"

      - name: 构建 scrcpy server (Release APK)
        run: |
          cd _scrcpy_fork/server
          gradle assembleRelease --no-daemon

      - name: 打包并上传 Artifact
        run: |
          cp _scrcpy_fork/server/build/outputs/apk/release/server-release.apk scrcpy-server-with-audio.apk

      - name: 上传供下载
        uses: actions/upload-artifact@v4
        with:
          name: scrcpy-server-with-audio
          path: scrcpy-server-with-audio.apk
