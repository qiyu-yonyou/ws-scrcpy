# 在 GitHub 上手动运行后，可从本页 Artifacts 下载「带音频的 scrcpy-server」。
# 无需本机安装 Android 环境，下载得到的 apk 改名为 scrcpy-server.jar 放到 vendor/Genymobile/scrcpy/ 即可。
name: 构建带音频的 scrcpy-server

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >
            tools
            platform-tools
            platforms;android-33
            build-tools;34.0.0

      - name: 构建 scrcpy server (Release APK)
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 7.5
          working-directory: _scrcpy_fork/server
          build-arguments: assembleRelease --no-daemon

      - name: 打包为 scrcpy-server 并上传
        run: |
          cp _scrcpy_fork/server/build/outputs/apk/release/server-release.apk scrcpy-server-with-audio.apk

      - name: 上传 Artifact 供下载
        uses: actions/upload-artifact@v4
        with:
          name: scrcpy-server-with-audio
          path: scrcpy-server-with-audio.apk
