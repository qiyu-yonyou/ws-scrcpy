# 运行后从 Artifacts 下载 apk，改名为 scrcpy-server.jar 放到 vendor/Genymobile/scrcpy/
# 触发方式：① 网页点 Run workflow（若有） ② 推送本 workflow 文件或推送含 trigger-scrcpy-server-build 的提交
name: 构建带音频的 scrcpy-server

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-scrcpy-server-audio.yml'
      - 'trigger-scrcpy-server-build'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 确认使用当前 workflow（apt 安装 Gradle，无 gradle action）
        run: echo "Workflow 版本: apt-gradle-$(date +%Y%m%d)；无 setup-gradle/无 gradle-build-action"

      - name: 检出仓库（含子模块 _scrcpy_fork）
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 设置 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >
            tools
            platform-tools
            platforms;android-33
            build-tools;33.0.2

      - name: 安装 Gradle（系统包，避免缓存/下载失败）
        run: sudo apt-get update && sudo apt-get install -y gradle

      - name: 构建 scrcpy server (Release APK)
        run: |
          cd _scrcpy_fork/server
          gradle assembleRelease --no-daemon

      - name: 打包并上传 Artifact
        run: |
          cp _scrcpy_fork/server/build/outputs/apk/release/server-release.apk scrcpy-server-with-audio.apk

      - name: 上传供下载
        uses: actions/upload-artifact@v4
        with:
          name: scrcpy-server-with-audio
          path: scrcpy-server-with-audio.apk
