# 运行后从 Artifacts 下载 apk，改名为 scrcpy-server.jar 放到 vendor/Genymobile/scrcpy/
# 触发：推送本文件或推送含 trigger-scrcpy-server-build 的提交
name: 构建带音频的 scrcpy-server

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-scrcpy-server-audio.yml'
      - 'trigger-scrcpy-server-build'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 检出主仓库（不拉取子模块，避免子模块报错）
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: 拉取可构建的 scrcpy 源码到 _scrcpy_fork
        run: |
          set -e
          rm -rf _scrcpy_fork
          git clone --depth 1 https://github.com/NetrisTV/scrcpy.git _scrcpy_fork
          if [ ! -f _scrcpy_fork/server/build.gradle ]; then
            echo "::error::_scrcpy_fork/server 不存在 build.gradle"
            exit 1
          fi

      - name: 设置 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >
            tools
            platform-tools
            platforms;android-33
            build-tools;33.0.2

      - name: 安装 Gradle 并构建
        run: |
          set -e
          sudo apt-get update -qq
          sudo apt-get install -y -qq gradle
          cd _scrcpy_fork/server
          gradle assembleRelease --no-daemon --stacktrace

      - name: 打包并上传
        run: |
          set -e
          cp _scrcpy_fork/server/build/outputs/apk/release/server-release.apk scrcpy-server-with-audio.apk

      - name: 上传 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: scrcpy-server-with-audio
          path: scrcpy-server-with-audio.apk
